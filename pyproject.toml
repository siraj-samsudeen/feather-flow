[project]
name = "feather-etl"
version = "0.2.0-dev"
description = "Config-driven ETL for heterogeneous ERP sources → local DuckDB (code-reorg rewrite)"
license = "MIT"
authors = [
    { name = "Siraj Samsudeen", email = "mailsiraj@gmail.com" }
]
requires-python = ">=3.10"
keywords = ["etl", "duckdb", "erp", "data-engineering", "pipeline"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Database",
]
dependencies = [
    "duckdb>=1.0",
    "pyarrow>=15.0",
    "pyyaml>=6.0",
    "typer>=0.9",
    "pyodbc>=5.0",
    "psycopg2-binary>=2.9",
    "python-dotenv>=1.0",
    "pytz",  # not imported directly, but DuckDB needs it for timestamp→Python conversion
    "mysql-connector-python>=8.0",
]

[project.urls]
Homepage = "https://github.com/siraj-samsudeen/feather-etl"
Repository = "https://github.com/siraj-samsudeen/feather-etl"

[project.scripts]
feather = "feather_etl.cli:app"
feather-etl = "feather_etl.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/feather_etl"]
include = ["src/feather_etl/resources/**"]
exclude = [
    "src/feather_etl/**/*_test.py",
    "src/feather_etl/**/scenarios/**",
    "src/feather_etl/testing/**",
]

[tool.hatch.build.targets.sdist]
exclude = [
    "tests/",
    ".claude/",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "poethepoet>=0.44.0",
    "pytest-testmon>=2.2.0",
    "pytest-watcher>=0.6.3",
]

[tool.poe.tasks.cov-all]
help = "HTML coverage report across feather_etl, opened in browser. Default pytest already shows term-missing."
shell = "pytest -rs --cov-report=html ; open htmlcov/index.html"

[tool.poe.tasks.tw]
help = "Watch mode with testmon — re-run only tests affected by saved changes (Jest-like). No coverage gate."
cmd = "ptw . --now --testmon -q --no-cov"

[tool.poe.tasks.tw-all]
help = "Watch mode without testmon — re-run the full suite on every change. No coverage gate."
cmd = "ptw . --now -q --no-cov"

[tool.pytest.ini_options]
testpaths = ["src", "tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--import-mode=importlib",
    "--cov=src/feather_etl",
    "--cov-branch",
    "--cov-report=term-missing",
    "--cov-fail-under=100",
]

[tool.coverage.run]
source = ["src/feather_etl"]
omit = [
    "src/feather_etl/**/*_test.py",
    "src/feather_etl/**/scenarios/**",
    "src/feather_etl/testing/**",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]

[tool.ruff]
src = ["src"]
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "D100", # missing module docstring
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D100"]
"**/*_test.py" = ["D100"]
