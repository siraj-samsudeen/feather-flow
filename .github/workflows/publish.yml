name: Publish to npm

# Triggers on tag push only (e.g. `git push origin v2.0.1`).
# The release skill drives this — it bumps the version, tags, and pushes.
# Pushing a tag is the explicit "publish this version" signal.
#
# Prior versions of this workflow triggered on every push to main and
# auto-bumped the patch version when local matched npm. That caused
# rebase conflicts during manual releases (the auto-commit landed on
# origin between the version bump and the tag push) and produced
# undocumented patch versions for non-release commits like docs fixes.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag ($TAG) does not match package.json version ($PKG)"
            exit 1
          fi
          echo "Publishing v$PKG (tag matches)"

      - name: Publish to npm
        run: npm publish --provenance --access public
