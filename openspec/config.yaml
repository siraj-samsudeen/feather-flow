schema: spec-driven

# Project context — shown to AI when creating any OpenSpec artifact in this
# project. These are the load-bearing references. Read them before drafting.
context: |
  Project: feather-etl rewrite. The PRD at `docs/prd/PRD-NNN-<phase>.md` is the
  source of truth for what to build. Prior implementations on `main` and
  `code-reorg` branches are reference-only — inherit nothing automatically.

  Required reading before writing any artifact:
  - `CLAUDE.md` — repo-wide agent instructions and current PRD path.
  - `docs/prd/PRD-001-explore-phase.md` — active PRD (explore phase).
  - `docs/spec-conventions.md` — requirement/scenario numbering (`1`, `1a`, `1b`,
    `2a`, ...) with local scope per spec file. Cross-file refs: `<capability>.<N><letter>`.
  - `docs/testing.md` — test cadence (A + II: vertical scenario commits,
    test-first batch per slice, Option 4 layering). 100% line+branch coverage.

  Cross-project principles to apply (in `~/Dropbox/Siraj/Projects/siraj-claude-vault/cross-project/principles/`):
  - `core-earns-complexity.md` — default to KISS on the edges; sophistication
    only where it carries the feature's load-bearing value.
  - `commit-per-scenario-with-grouping.md` — granularity rule for tasks.md:
    one scenario per commit by default; combine when same code path or when
    a scenario's observability depends on another.
  - `design-vs-spec-separation.md` — design.md is for real technical decisions
    not dictated by the spec; never restate spec requirements as decisions.
  - `plan-preflight.md` — present plans as lightweight altitude outlines; deep
    detail goes in the artifact file the user reviews.
  - `spec-sections-natural-shape.md`, `spec-sections-pull-unique-weight.md` —
    right-size sections; skip sections that add no signal.

  Pre-commit review workflow:
  - After substantial rewrites of an OpenSpec change (proposal, spec, design,
    or tasks), invoke the `review-openspec-change` skill before committing.
    It launches two parallel Sonnet subagents — one for cross-doc consistency
    (contradictions, stale references, scenario-to-commit mapping integrity),
    one for verbosity vs guardrails (over-shooting and under-shooting for
    human + agent audiences). Catches what authoring missed. Suggest the
    skill proactively when the user signals they're winding down a change.

  Conventions specific to this project:
  - `feather init` is verb 1 of the explore phase; every later verb assumes a
    scaffolded project. Build verbs in PRD §10 workflow order.
  - The `add-feather-init` change is the template every subsequent verb follows
    — its design decisions (core/cli split, minimal pyproject + uv add hint,
    spec-driven errors only) are inherited unless explicitly overridden in a
    later verb's design.md.
  - Tests colocate as `<module>_test.py` siblings next to the code they test.
  - Each verb owns its full footprint, including its own `.gitignore` entries
    and any directories it writes into (lazy creation on first write).
  - Dogfood feather inside this repo under `examples/<client>/`.

# Per-artifact rules — the AI sees only the rules for the artifact it's
# currently working on. Keep each rule tight and actionable.
rules:
  proposal:
    - Keep proposals concise. State Why, What, What this change does NOT do,
      and Impact. The "Does NOT do" section lists options considered and
      rejected with one-line reasoning each — this prevents re-litigation later.
    - The Impact section names every file/section touched outside the change
      folder (PRD edits, CLAUDE.md edits, vault principle updates, etc.).
    - Reference the PRD section the change implements (e.g. "PRD §6.1") at the
      top of "Why". If the change updates the PRD, list those edits in Impact.
    - Do not repeat the same rationale multiple times within the proposal —
      state each design choice once, in the section most natural to its
      audience. If a "Does NOT do" bullet already covers a topic, the
      preceding table/prose should not restate it.
    - Cross-cutting verb contracts (exit codes, output-stream conventions,
      verb-wide invariants) belong in the "What" section as one or two
      sentences, not as their own spec Requirements — spec.md is for
      behavioral promises with unique scenarios.

  specs:
    - Number every Requirement and Scenario per `docs/spec-conventions.md`.
      Requirements use sequential integers (`1`, `2`, `3`) within the spec file.
      Scenarios use the parent requirement's number plus a lowercase letter
      (`1a`, `1b`, `2a`). Numbering is local per spec.md file; do not number
      across files.
    - |
      OpenSpec's parser is strict — scenarios MUST use exactly four hashtags
      (`#### Scenario:`) and requirements use three (`### Requirement:`). The
      position number goes inside the name, after the prefix, e.g.
      `### Requirement: 1. Target directory resolution`.
    - Every requirement MUST have at least one scenario. Use SHALL/MUST for
      normative requirements (avoid should/may).
    - Avoid tautological scenarios. If a scenario's assertion is already
      implied by another scenario in the same spec (e.g., "init exits 0 on
      success" when every other scenario's THEN demonstrates exit 0), it does
      not earn its place. Drop it or fold the assertion into the parent
      scenario.
    - Anchor vague phrases to specific requirements or sections. Words like
      "clear message", "appropriate error", "informative output" leave the
      implementer guessing — cross-reference the exact message format
      specified elsewhere, or state the format here.
    - Meta-requirements ("X is ignored", "Y is unchanged") are usually
      weaker than folding the assertion into the most-relevant positive
      scenario. Reserve standalone meta-requirements for non-behaviors that
      have no natural positive home.

  design:
    - Include design.md only when the change has real technical decisions
      worth recording — architectural choices, code structure, error handling
      pattern, library or framework selection, why-X-over-Y trade-offs.
      Skip it for trivial changes.
    - Decisions in design.md MUST be technical choices not dictated by the
      spec. A "decision" that restates a spec Requirement or rationalizes
      what the spec already says belongs in proposal.md's "Does NOT do"
      section, not here.
    - |
      Structure `## Decisions` as numbered decisions with rejected
      alternatives inline (`Rejected: X — Y`). This makes the trail of
      considered options visible to future readers.
    - Skip the Context section unless it earns its weight. If it would just
      restate the project-wide stance from CLAUDE.md (e.g., "this change
      inherits nothing from main"), delete it — that's already canonical
      elsewhere.
    - For the first verb in a new area, design.md sets conventions every
      subsequent verb inherits. Name these explicitly ("convention for the
      rewrite", "pattern other verbs follow") so future authors know whether
      they can override.
    - Risks / Trade-offs uses the format `**[risk]** — mitigation /
      acceptance reason`. Be specific about which risks are accepted vs
      mitigated.

  tasks:
    - Spec is the source of behavioral truth — referenced scenarios must
      pass. Design is the source of architectural truth — its decisions
      guide implementation choices. The implementing engineer (or agent)
      reads both and makes the per-line decisions; tasks.md never restates
      what either already says. Every spec scenario appears in exactly one
      commit — no scenario verified only implicitly.
    - Slice vertically by spec scenario, not horizontally by layer. Each
      commit ends with a green test run, 100% line+branch coverage on the
      touched code, and a working CLI that does more than the previous
      commit. See `docs/testing.md` for the full A + II cadence.
    - Default scenario-to-commit ratio is one scenario per commit. Combine
      scenarios into one commit ONLY when (a) they share one code path
      (e.g., two branches of an `if exists:` statement) or (b) one
      scenario's observability depends on another being implemented in the
      same commit (e.g., "files are stamped where?" requires the file
      content to be defined).
    - Every tasks.md MUST include a "Scenario → commit mapping" section in
      the preamble, mapping every spec scenario to exactly one commit (or
      flagging infrastructure-only commits with no spec scenario). Reviewers
      and subagents use this section to verify completeness at a glance.
    - Test-writing tasks come FIRST in each commit's task order, before
      implementation tasks. Per A + II, write tests, confirm RED, then
      implement to GREEN. The position of the test task in the list IS the
      contract — never write tests "last with a write-first label".
    - |
      Test-writing tasks MUST list each scenario as a sub-bullet with a
      one-line noun-phrase gloss naming the behaviour under test — not a
      paraphrase of the assertions. The gloss saves the implementer a
      round-trip to spec.md while keeping spec.md the source of truth for
      assertions. Example:
        - [ ] 1.1 Write tests for:
              - 1a — init in CWD stamps files into the target
              - 2a — `feather.yaml` content matches the template
              Run them — confirm RED.
      Anti-pattern (do NOT do this — restates spec assertions and creates
      a second source of truth that will drift):
        - [ ] 1.1 Write tests for:
              - 1a — assert feather.yaml, pyproject.toml, .env, .gitignore
                all exist after init in /projects/rama_dw
              ...
    - Task descriptions are state-achieved sentences (e.g., "After this
      commit, X works"), not line-by-line implementation steps. Do NOT
      prescribe field names, function signatures, or file-level edits —
      let the spec and design guide the implementer. Treating the
      implementer (junior dev or agent) as a copy-paste machine produces
      brittle docs and bored engineers.
    - |
      Each task is a single `- [ ] N.M description` checkbox. Tasks within
      a commit are ordered — tests first, then implementation, then coverage
      verification.
    - The last commit of a change is typically a doc/PRD reconciliation
      commit — delete it if the doc edits were already made earlier in the
      same change.
